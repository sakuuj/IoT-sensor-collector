spring:
  application.name: iot-sensor-collector
  threads.virtual.enabled: true
  cassandra:
    request:
      consistency: quorum
      timeout: 1s
    contact-points: s-cnode-1:9042
    local-datacenter: datacenter1
  flyway.enabled: false

custom:
  flyway:
    schemas: flyway_keyspace
    sql-migration-suffixes: .cql
    locations: classpath:db/migration

logging:
  level:
    com.datastax.oss.driver: DEBUG
    org.springframework.data.cassandra: DEBUG
    org.flywaydb: DEBUG